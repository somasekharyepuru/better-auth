# ============================================================
# AUTH BACKEND DOCKER COMPOSE (NestJS)
# ============================================================
# Services:
#   - PostgreSQL: Database
#   - Redis: Email queue + caching
#   - Mailhog: Email testing (dev only)
#   - Backend: Auth service (NestJS)
#
# Usage:
#   Development: docker compose up
#   Production: NODE_ENV=production docker compose up
# ============================================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: daymark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-auth_service}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - daymark-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - daymark-network

  # Redis for email queue and caching
  redis:
    image: redis:7-alpine
    container_name: daymark-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - daymark-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - daymark-network

  # Mailhog for email testing (development only)
  mailhog:
    image: mailhog/mailhog
    container_name: daymark-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"   # SMTP server
      - "${MAILHOG_UI_PORT:-8025}:8025"      # Web UI
    networks:
      - daymark-network

  # Backend Service (NestJS)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    container_name: daymark-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    env_file:
      - .env
    environment:
      # Database
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-auth_service}?schema=public

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_dev_password}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379

      # Better Auth
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3002}
      - APP_NAME=${APP_NAME:-Daymark}

      # CORS
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001,http://localhost:5173}

      # Mobile
      - MOBILE_API_KEY=${MOBILE_API_KEY}

      # Email (SMTP)
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@daymark.app}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Daymark}
      - MAIL_MAX_RETRIES=${MAIL_MAX_RETRIES:-3}

      # Social Providers
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}

      # Node
      - NODE_ENV=${NODE_ENV:-development}
      - NODE_OPTIONS=--max-old-space-size=4096
      - PORT=3000
    volumes:
      # Mount source code for hot reload, but exclude node_modules and dist
      - ./src:/app/src:delegated
      - ./prisma:/app/prisma:delegated
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./nest-cli.json:/app/nest-cli.json:ro
      - ./.env:/app/.env:ro
      - ./wait-for-db.sh:/app/wait-for-db.sh:ro
    networks:
      - daymark-network
    # Help with external DNS resolution (Cloudflare-protected endpoints)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  daymark-postgres-data:
    driver: local
  daymark-redis-data:
    driver: local

networks:
  daymark-network:
    driver: bridge
